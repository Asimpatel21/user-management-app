# ============================================
# Server settings
# ============================================
server.port=8080

# ============================================
# Database connection (MS SQL Server)
# Change these 3 lines to match your SSMS setup
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=UserManagementDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=springuser
   spring.datasource.password=YOUR_PASSWORD_HERE
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================
# JPA / Hibernate settings
# ============================================
# "update" = Hibernate will auto-create/alter tables to match our Java entities.
# Since we already created the table ourselves in SSMS, "update" will just verify it matches.
spring.jpa.hibernate.ddl-auto=update

# Prints the actual SQL Hibernate runs, in the console -- great for learning/debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate which SQL "dialect" (flavor) to generate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ============================================
# Thymeleaf settings
# ============================================
# Turns off template caching so changes to .html files show up without restarting (dev convenience)
spring.thymeleaf.cache=false
