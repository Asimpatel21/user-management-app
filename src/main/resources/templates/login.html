<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 400px;">
    <h2 class="mb-4 text-center">Log In</h2>

    <!-- These appear based on which query parameter is present in the URL,
         e.g. /login?signupSuccess after a successful signup redirect -->
    <div th:if="${param.signupSuccess}" class="alert alert-success">
        Account created! Please log in.
    </div>
    <div th:if="${param.loggedOut}" class="alert alert-info">
        You have been logged out.
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
        </div>

        <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a th:href="@{/signup}">Sign up</a>
    </p>
</div>
</body>
</html>
