<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 450px;">
    <h2 class="mb-4 text-center">Create an Account</h2>

    <!-- Shows a manual error we set in the controller, e.g. "username already taken" -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/signup}" th:object="${account}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-control"/>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control"/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select th:field="*{role}" class="form-select">
                <option value="USER">User (view/manage users)</option>
                <option value="ADMIN">Admin (also can bulk-upload users)</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Sign Up</button>
    </form>

    <p class="text-center mt-3">
        Already have an account? <a th:href="@{/login}">Log in</a>
    </p>
</div>
</body>
</html>
