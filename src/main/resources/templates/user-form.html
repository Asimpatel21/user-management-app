<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- th:text picks the page title depending on whether we're adding or editing -->
    <title th:text="${user.id} == null ? 'Add User' : 'Edit User'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 500px;">
    <h2 th:text="${user.id} == null ? 'Add New User' : 'Edit User'" class="mb-4"></h2>

    <!--
      th:action="@{/users}" -> form always submits (POST) to /users, whether creating or editing.
      th:object="${user}" -> binds every "*{field}" input below to the matching User field.
    -->
    <form th:action="@{/users}" th:object="${user}" method="post">

        <!-- Hidden field: keeps the id when editing, so save() knows to UPDATE instead of INSERT -->
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{fullName}" class="form-control"/>
            <!-- Shows a validation error message if @NotBlank failed for this field -->
            <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" th:field="*{phoneNumber}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" th:field="*{address}" class="form-control"/>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
