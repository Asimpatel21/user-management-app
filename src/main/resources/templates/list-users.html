<!DOCTYPE html>
<!-- xmlns:th declares the Thymeleaf namespace so th:* attributes work -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>User Management</h2>
        <div>
            <!-- ${session.loggedInUser} / ${session.role} read directly from the HttpSession -->
            <span class="text-muted me-2">
                Logged in as <strong th:text="${session.loggedInUser}"></strong>
                (<span th:text="${session.role}"></span>)
            </span>
            <!-- th:if only renders this button when the session's role is exactly ADMIN -->
            <a th:if="${session.role == 'ADMIN'}" th:href="@{/users/upload}" class="btn btn-warning">Bulk Upload</a>
            <a th:href="@{/users/new}" class="btn btn-primary">+ Add User</a>
            <a th:href="@{/logout}" class="btn btn-outline-secondary">Logout</a>
        </div>
    </div>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- th:each loops over the "users" list passed from the controller -->
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.fullName}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.phoneNumber}"></td>
            <td th:text="${user.address}"></td>
            <td>
                <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="@{/users/delete/{id}(id=${user.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Delete this user?');">Delete</a>
            </td>
        </tr>
        <!-- Shown only when the list is empty -->
        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="6" class="text-center text-muted">No users yet. Click "Add User" to create one.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
